<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #222;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f8ef7; }

    .input-row button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #3a7de0; }

    .list { list-style: none; }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .list li:last-child { border-bottom: none; }

    .list input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #4f8ef7;
      flex-shrink: 0;
    }

    .list .name {
      flex: 1;
      font-size: 1rem;
      color: #333;
      transition: color 0.2s;
    }

    .list li.checked .name {
      text-decoration: line-through;
      color: #aaa;
    }

    .list .delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .list .delete:hover { color: #e05252; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>
    <ul class="list" id="list"></ul>
    <p class="empty" id="empty">아직 아이템이 없습니다.</p>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://wtxdozhlfvqbtjudidyi.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind0eGRvemhsZnZxYnRqdWRpZHlpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjQ3NjUsImV4cCI6MjA5NTA0MDc2NX0.OHd6HDtlk5mdaqipfo-0hpTuJzaFORq1F_IQysBapd0';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const input = document.getElementById('itemInput');
    const list = document.getElementById('list');
    const empty = document.getElementById('empty');

    let items = [];

    async function loadItems() {
      const { data, error } = await supabase
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });
      if (!error) {
        items = data;
        render();
      }
    }

    function render() {
      list.innerHTML = '';
      empty.style.display = items.length ? 'none' : 'block';

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        li.innerHTML = `
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="window.toggle('${item.id}', ${item.checked})">
          <span class="name">${item.name}</span>
          <button class="delete" onclick="window.remove('${item.id}')">✕</button>
        `;
        list.appendChild(li);
      });
    }

    window.addItem = async function() {
      const name = input.value.trim();
      if (!name) return;
      input.value = '';
      const { data, error } = await supabase
        .from('shopping_items')
        .insert({ name, checked: false })
        .select()
        .single();
      if (!error) {
        items.push(data);
        render();
      }
      input.focus();
    };

    window.toggle = async function(id, currentChecked) {
      const { error } = await supabase
        .from('shopping_items')
        .update({ checked: !currentChecked })
        .eq('id', id);
      if (!error) {
        const item = items.find(i => i.id === id);
        if (item) item.checked = !currentChecked;
        render();
      }
    };

    window.remove = async function(id) {
      const { error } = await supabase
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (!error) {
        items = items.filter(i => i.id !== id);
        render();
      }
    };

    input.addEventListener('keydown', e => { if (e.key === 'Enter') window.addItem(); });

    loadItems();
  </script>
</body>
</html>
